<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALVIN PROD | STUDIO PORTFOLIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,800;1,800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg-dark: #05070a; }
        body { background: var(--bg-dark); color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background-image: radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.05) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(239, 68, 68, 0.05) 0%, transparent 50%); }
        .sidebar { background: rgba(15, 18, 26, 0.9); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-item { cursor: pointer; transition: 0.4s; border-radius: 16px; margin-bottom: 12px; border: 1px solid transparent; background: rgba(255, 255, 255, 0.02); }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); }
        .nav-item.active { background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, rgba(59, 130, 246, 0.05) 100%); border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 30px rgba(59, 130, 246, 0.15); color: #fff; }
        
        /* BRO-TIONARY STYLE */
        .bro-item { cursor: pointer; transition: 0.3s; border-radius: 10px; padding: 8px 12px; margin-bottom: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: rgba(255, 255, 255, 0.6); }
        .bro-item:hover { background: rgba(59, 130, 246, 0.1); color: #fff; transform: translateX(5px); }
        .bro-item.active { background: rgba(59, 130, 246, 0.2); color: #fff; border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }

        .main-view { height: 100vh; overflow-y: auto; scroll-behavior: smooth; }
        
        /* KARAOKE STYLE + CLICK TO SEEK */
        .lyrics-container { height: 450px; overflow-y: auto; scroll-behavior: smooth; scrollbar-width: none; mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent); }
        .lyric-line { font-size: 1.8rem; line-height: 1.6; margin-bottom: 25px; transition: all 0.3s ease; opacity: 0.1; transform: scale(0.9); font-weight: 800; italic: true; cursor: pointer; position: relative; }
        .lyric-line:hover { opacity: 0.5; transform: scale(0.95); }
        .lyric-line.active { opacity: 1; transform: scale(1.1); color: #fff; text-shadow: 0 0 15px rgba(59, 130, 246, 0.8); }
        .lyric-line.bro-special { color: #f97316; text-shadow: 0 0 15px rgba(249, 115, 22, 0.8); }
        
        .album-cover { width: 320px; height: 320px; object-fit: cover; border-radius: 28px; box-shadow: 0 35px 70px rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.05); transition: 0.5s ease; }
        .album-cover:hover { transform: rotate(-3deg) scale(1.03); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px; }
        
        @keyframes glow { 0%, 100% { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); } 50% { text-shadow: 0 0 25px rgba(59, 130, 246, 0.8), 0 0 35px rgba(59, 130, 246, 0.4); } }
        .glow-text { animation: glow 3s infinite ease-in-out; }
    </style>
</head>
<body class="flex flex-col md:flex-row">

    <div class="sidebar w-full md:w-80 p-8 flex flex-col h-screen z-10">
        <div class="mb-12 text-center md:text-left">
            <h1 class="text-3xl font-extrabold tracking-tighter text-blue-500 italic uppercase glow-text">Alvin<span class="text-white font-normal text-sm ml-1 opacity-70">Prod.</span></h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-[0.4em] mt-3 font-bold italic">Studio Master 2026</p>
        </div>

        <nav id="track-list" class="flex-1 overflow-y-auto pr-2 mb-8">
            <div onclick="changeTrack('asa')" id="btn-asa" class="nav-item active p-5 flex items-center gap- group">
                <div class="w-10 h-10 bg-blue-600/20 text-blue-400 group-hover:bg-blue-600 group-hover:text-white transition rounded-xl flex items-center justify-center font-black">01</div>
                <div><p class="text-[11px] font-black uppercase tracking-widest">ASA</p></div>
            </div>
            <div onclick="changeTrack('sunset')" id="btn-sunset" class="nav-item p-5 flex items-center gap- group">
                <div class="w-10 h-10 bg-orange-600/20 text-orange-400 group-hover:bg-orange-600 group-hover:text-white transition rounded-xl flex items-center justify-center font-black">02</div>
                <div><p class="text-[11px] font-black uppercase tracking-widest">SUNSET</p></div>
            </div>
            <div onclick="changeTrack('japan')" id="btn-japan" class="nav-item p-5 flex items-center gap- group">
                <div class="w-10 h-10 bg-red-600/20 text-red-400 group-hover:bg-red-600 group-hover:text-white transition rounded-xl flex items-center justify-center font-black">03</div>
                <div><p class="text-[11px] font-black uppercase tracking-widest">TAKE ME TO JAPAN</p></div>
            </div>
        </nav>

        <div class="mt-auto border-t border-white/5 pt-6">
            <h4 class="text-[10px] text-blue-400 font-extrabold uppercase tracking-widest mb-4 flex items-center justify-center md:justify-start">
                <i class="fas fa-search-dollar mr-3"></i> Bro-tionary / Seek Nyanyian
            </h4>
            <div id="bro-dictionary" class="lyrics-scroll h-32 overflow-y-auto">
                </div>
        </div>
    </div>

    <div class="main-view flex-1 p-6 md:p-12 relative flex items-center justify-center">
        <div id="display-area" class="w-full max-w-5xl h-full flex items-center justify-center"></div>
    </div>

    <script>
        const tracks = {
            asa: {
                title: "ASA", color: "#3b82f6", file: "track1.mp3", img: "cover_asa.jpg",
                // Format: [detik, "lirik", "Tipe Nyanyian (Optional)"]
                lyrics: [
                    [0, "{ Verse 1 }"],
                    [2, "Seems like you're taking a chance"],
                    [5, "But, losing all your plans"],
                    [8, "While everyone's doing fine"],
                    [11, "You're left behind..."],
                    [15, "It's like you don't deserve it"],
                    [18, "Try hard but never make it"],
                    [21, "Hold on now, don't you bow"],
                    [24, "You're strong enough to face it!"],
                    [28, "{ Verse 2 }"],
                    [30, "Timeeee...... is it lonely?"],
                    [33, "Break away now, stop sharing problems"],
                    [36, "Come so louddd..."],
                    // BRO NYANYIAN KUNCI
                    [40, "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa", "Bro Nyanyian / Epic"],
                    [43, "aaaaaaaaaaaaaaaaaaaaaaaaaaaa", "Bro Nyanyian / High"],
                    [46, "aaaaaaaaaaaaaaaaaa", "Bro Nyanyian / Mid"],
                    [49, "aaaaaaaaaaaaa", "Bro Nyanyian / Outro"],
                    [52, "{ Pre Chorus }"],
                    [55, "All I know, I know it!"],
                    [58, "But you won't, admit it..."]
                ]
            },
            sunset: {
                title: "SUNSET", color: "#f97316", file: "sunset.mp3", img: "cover_sunset.jpg",
                lyrics: [
                    [0, "{ Verse 1 }"],
                    [2, "Sore hari ku enjoying"],
                    [6, "Tengah riding mengelilingi pantai"],
                    [10, "Lookin for sunsets for seeing"],
                    [14, "Tak lupa siapkan pose charming"],
                    [18, "{ Nyanyian Dolphin }"],
                    [20, "Dolphins ya dancing!", "Bro Dolphin Nyanyian"],
                    [22, "Jumping...", "Bro Dolphin Nyanyian"]
                ]
            },
            japan: {
                title: "TAKE ME TO JAPAN", color: "#ef4444", file: "TAKE TAKE ME TO JAPAN.mp3", img: "cover_japan.jpg",
                lyrics: [
                    [0, "{ Verse 1 }"],
                    [2, "Hey... I'm lying on my bed"],
                    [7, "Doing nothing just thinking"],
                    [12, "With One OK Rock playing..."],
                    [17, "I keep asking..."],
                    [20, "In this life"],
                    [22, "Is it I've been really doing something?"],
                    [25, "{ Nyanyian Impian }"],
                    [28, "Kamakura buildings!", "Bro Japan Nyanyian"],
                    [30, "Travelling حول Japan!", "Bro Japan Nyanyian"]
                ]
            }
        };

        function seekTo(seconds) {
            const audio = document.getElementById('main-audio');
            if (audio) {
                audio.currentTime = seconds;
                audio.play(); // Auto-play pas di-seek
            }
        }

        function changeTrack(key) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-' + key).classList.add('active');

            const track = tracks[key];
            const html = `
                <div class="flex flex-col lg:flex-row gap-16 items-center w-full animate-[fadeIn_0.6s_ease-out]">
                    <div class="flex-none text-center relative z-10">
                        <div class="absolute -inset-6 bg-[${track.color}] opacity-10 blur-3xl rounded-full"></div>
                        <img src="${track.img}" class="album-cover mb-8 mx-auto relative z-10" onerror="this.src='https://via.placeholder.com/320/1e293b/white?text=${track.title}'">
                        <div class="glass-panel p-6 w-96 mx-auto relative z-10">
                             <div class="flex justify-between text-[10px] mb-2 font-bold opacity-50 uppercase tracking-widest text-blue-400">
                                <span>Analog Mode</span>
                                <span>Karaoke / Click Seek</span>
                             </div>
                            <audio id="main-audio" controls class="w-full h-10"><source src="${track.file}" type="audio/mpeg"></audio>
                        </div>
                    </div>
                    
                    <div class="flex-1 w-full text-center lg:text-left">
                        <h2 class="text-6xl font-black text-white italic uppercase mb-10 tracking-tighter leading-none">${track.title}</h2>
                        <div id="lyrics-box" class="lyrics-container">
                            ${track.lyrics.map((line, index) => `
                                <div class="lyric-line ${line[2] ? 'bro-special' : ''}" id="line-${index}" onclick="seekTo(${line[0]})">
                                    ${line[1]}
                                    ${line[2] ? `<span class="text-[10px] text-blue-400 font-extrabold ml-3 opacity-50 tracking-widest">[Bro: ${line[2]}]</span>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('display-area').innerHTML = html;

            // Update Bro-tionary
            const dictDictEl = document.getElementById('bro-dictionary');
            dictDictEl.innerHTML = track.lyrics
                .filter(line => line[2])
                .map(line => `<div class="bro-item" onclick="seekTo(${line[0]})">Seek: ${line[2]}</div>`)
                .join('');

            const audio = document.getElementById('main-audio');
            audio.addEventListener('timeupdate', () => {
                const currentTime = audio.currentTime;
                track.lyrics.forEach((line, index) => {
                    if (currentTime >= line[0]) {
                        document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                        const lineEl = document.getElementById(`line-${index}`);
                        lineEl.classList.add('active');
                        lineEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            });
        }

        // Init
        changeTrack('asa');
    </script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</body>
</html>
