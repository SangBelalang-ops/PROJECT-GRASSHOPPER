<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALVIN PROD | STUDIO PORTFOLIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,800;1,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --bg-dark: #05070a;
        }
        body { 
            background: var(--bg-dark); 
            color: #e2e8f0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden;
            background-image: radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, rgba(239, 68, 68, 0.05) 0%, transparent 50%);
        }
        .sidebar { 
            background: rgba(15, 18, 26, 0.8); 
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .nav-item { 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 16px; 
            margin-bottom: 12px; 
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.02);
        }
        .nav-item:hover { 
            background: rgba(255, 255, 255, 0.05); 
            transform: translateX(8px);
        }
        .nav-item.active { 
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, rgba(59, 130, 246, 0.05) 100%);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.15);
            color: #fff;
        }
        .main-view { height: 100vh; overflow-y: auto; scroll-behavior: smooth; }
        .lyrics-scroll { 
            height: 450px; 
            overflow-y: auto; 
            white-space: pre-wrap; 
            line-height: 2; 
            padding-right: 20px;
            scrollbar-width: thin; 
            scrollbar-color: #3b82f6 transparent; 
        }
        .lyrics-scroll::-webkit-scrollbar { width: 4px; }
        .lyrics-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        .album-cover { 
            width: 320px; height: 320px; 
            object-fit: cover; 
            border-radius: 24px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.1);
            transition: transform 0.5s ease;
        }
        .album-cover:hover { transform: scale(1.02) rotate(2deg); }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
        }
        
        @keyframes glow {
            0% { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
            50% { text-shadow: 0 0 20px rgba(59, 130, 246, 0.8), 0 0 30px rgba(59, 130, 246, 0.4); }
            100% { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        }
        .glow-text { animation: glow 3s infinite ease-in-out; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(30px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
    </style>
</head>
<body class="flex flex-col md:flex-row">

            <div class="h-1 w-12 bg-blue-600 mt-2 rounded-full"></div>
            <p class="text-[10px] text-slate-500 uppercase tracking-[0.4em] mt-3 font-bold italic">Studio Master 2026</p>
        </div>

        <nav id="track-list" class="flex-1 overflow-y-auto pr-2">

                <div><p class="text-[11px] font-black uppercase tracking-widest">SUNSET</p><p class="text-[9px] opacity-40 italic">Beach Chill</p></div>
            </div>
            <div onclick="changeTrack('japan')" id="btn-japan" class="nav-item p-5 flex items-center gap-4 group">
                <div class="w-12 h-12 bg-red-600/20 text-red-400 group-hover:bg-red-600 group-hover:text-white transition-all rounded-xl flex items-center justify-center font-black">03</div>
                <div><p class="text-[11px] font-black uppercase tracking-widest">TAKE ME TO JAPAN</p><p class="text-[9px] opacity-40 italic">Dreamy J-Pop</p></div>
            </div>
        </nav>

        <div class="mt-auto pt-6 border-t border-white/5">
            <a href="https://wa.me/628123456789" class="flex items-center justify-center gap-3 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-xs font-black rounded-2xl uppercase tracking-widest shadow-xl hover:scale-105 active:scale-95 transition-all">
                <i class="fab fa-whatsapp text-lg"></i> Hire Studio
            </a>
        </div>
    </div>

    <div class="main-view flex-1 p-6 md:p-12 relative">

        function changeTrack(key) {

            document.getElementById('btn-' + key).classList.add('active');

            const track = tracks[key];
            const html = `

${track.lyrics}

</body>
</html>
