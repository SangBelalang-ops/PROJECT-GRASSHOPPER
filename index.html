<footer>
    <h3 style="color: var(--primary); letter-spacing: 2px; margin-bottom: 10px; font-weight: 900; font-size: 1em;">THANK YOU FOR SHOPPING SNACKERS!</h3>
    <p style="color: #888; font-size: 0.85em; max-width: 300px; margin: 0 auto; line-height: 1.6;">
        Makasih sudah mampir dan belanja. Selamat menikmati jajanannya, Bosku!
    </p>
    <div style="margin-top: 20px; opacity: 0.3; font-size: 0.55em; letter-spacing: 5px;">
        TERSNACKS.ID • 2026
    </div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- ISI DENGAN DATA DARI FIREBASE CONSOLE LO ---
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "tersnacks-xxxx.firebaseapp.com",
        databaseURL: "https://tersnacks-xxxx.firebaseio.com",
        projectId: "tersnacks-xxxx",
        storageBucket: "tersnacks-xxxx.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const reviewRef = ref(db, 'reviews');

    onValue(reviewRef, (snapshot) => {
        const container = document.getElementById('review-container');
        const data = snapshot.val();
        if (!data) {
            container.innerHTML = `<div style="text-align:center; color:#444; margin-top:100px;">BELUM ADA REVIEW.</div>`;
            return;
        }
        container.innerHTML = '';
        Object.values(data).reverse().forEach(rev => {
            const item = document.createElement('div');
            item.className = 'review-item';
            item.innerHTML = `
                <div style="color: var(--primary); font-weight: 900; font-size: 0.7em;">${rev.nama.toUpperCase()}</div>
                <div style="font-size: 0.85em; margin-top: 4px; color: #eee;">${rev.pesan}</div>`;
            container.appendChild(item);
        });
    });

    window.postReview = function() {
        const nama = document.getElementById('rev-nama').value;
        const pesan = document.getElementById('rev-pesan').value;
        const btn = document.getElementById('btn-post-rev');
        if(!nama || !pesan) return alert("Isi dulu Nama & Pesan lo brok!");
        btn.innerText = "MENGIRIM..."; btn.disabled = true;
        push(reviewRef, { nama, pesan, timestamp: serverTimestamp() }).then(() => {
            document.getElementById('rev-nama').value = '';
            document.getElementById('rev-pesan').value = '';
            btn.innerText = "KIRIM REVIEW 🚀"; btn.disabled = false;
        });
    };
</script>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwhUXfi13J6KCnDp4l9-WcpRyMGNJSD8GXWROqE1b_1voh_5kAoLBOPYVsoxXiLbC27/exec";

    function createSnack() {
        const icons = ['🥨', '🍪', '🍬', '🥜', '🍿'];
        const snack = document.createElement('div');
        snack.className = 'falling-snack';
        snack.innerText = icons[Math.floor(Math.random() * icons.length)];
        snack.style.left = Math.random() * 100 + 'vw';
        snack.style.animationDuration = Math.random() * 2 + 3 + 's';
        snack.style.opacity = Math.random() * 0.5 + 0.5;
        document.body.appendChild(snack);
        setTimeout(() => snack.remove(), 5000);
    }
    setInterval(createSnack, 250);

    let snackData = [
        { id: 0, name: "KACANG TOJIN", stock: 0, img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
        { id: 1, name: "KETAWA", stock: 0, img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
        { id: 2, name: "KACANG TING TING", stock: 0, img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
        { id: 3, name: "MIE LIDI", stock: 0, img: "https://i.postimg.cc/K84vp9Pc/5bb5bc5e-cf70-47c1-86c5-dbd05e0cc616.jpg" },
        { id: 4, name: "MAKARONI", stock: 0, img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
        { id: 5, name: "BASRENG", stock: 0, img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
        { id: 6, name: "LUMPIA", stock: 0, img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
        { id: 7, name: "KACANG ARAB", stock: 0, img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
        { id: 8, name: "KACANG MADU", stock: 0, img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
    ];

    let cart = {};

    async function init() {
        try {
            const res = await fetch(scriptURL);
            const sheetStok = await res.json();
            snackData.forEach(s => { 
                if(sheetStok[s.name] !== undefined) s.stock = sheetStok[s.name]; 
            });
            document.getElementById('loading').style.display = 'none';
            render();
        } catch(e) { setTimeout(init, 3000); }
    }

    function render() {
        const grid = document.getElementById('container-snack');
        grid.innerHTML = '';
        snackData.forEach(s => {
            const empty = s.stock <= 0;
            grid.innerHTML += `
                <div class="card ${empty ? 'is-empty' : ''}">
                    <div class="sold-out-overlay"><div class="sold-out-text">SOLD OUT</div></div>
                    <img src="${s.img}">
                    <div class="card-info">
                        <div class="card-name">${s.name}</div>
                        <div class="stock-tag">SISA: ${s.stock}</div>
                        <div class="counter">
                            <button class="btn-qty" onclick="changeQty(${s.id},-1)" ${empty? 'disabled':''}>-</button>
                            <span id="qty-${s.id}" style="font-weight:900; min-width:20px;">0</span>
                            <button class="btn-qty" onclick="changeQty(${s.id},1)" ${empty? 'disabled':''}>+</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function changeQty(id, delta) {
        let q = cart[id] || 0;
        if(delta > 0 && q >= snackData[id].stock) return;
        q += delta; if(q < 0) q = 0;
        cart[id] = q;
        document.getElementById(`qty-${id}`).innerText = q;
        updateTotal();
    }

    function updateTotal() {
        let total = 0; let list = [];
        Object.keys(cart).forEach(id => {
            if(cart[id]>0) { total += cart[id]*3; list.push(`${cart[id]}x ${snackData[id].name}`); }
        });
        document.getElementById('total-bar').style.display = total > 0 ? 'flex' : 'none';
        document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
        document.getElementById('summary').innerText = list.join(", ");
    }

    window.openPayment = function() { 
        document.getElementById('payment-area').style.display='block'; 
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'}); 
    }

    window.showQR = function(t, b) {
        document.getElementById('qr-usd').style.display = t=='usd'?'block':'none';
        document.getElementById('qr-riel').style.display = t=='riel'?'block':'none';
    }

    window.sendToSpreadsheet = function() {
        const nama = document.getElementById('nama-pembeli').value;
        if(!nama) return alert("Siapa Nama Bosku?");
        let list = []; let total = 0;
        Object.keys(cart).forEach(id => { if(cart[id]>0){ total += cart[id]*3; list.push(`${cart[id]}x ${snackData[id].name}`); }});
        const btn = document.getElementById('submit-btn');
        btn.innerText = "MENGIRIM..."; btn.disabled = true;
        const params = new URLSearchParams();
        params.append('pesanan', `Pembeli: ${nama} | Order: ${list.join(", ")}`);
        params.append('total', "$" + total.toFixed(2));
        fetch(`${scriptURL}?${params.toString()}`, { method: 'POST', mode: 'no-cors' })
        .then(() => { alert("MANTAP! Pesanan Berhasil."); location.reload(); });
    }

    init();
</script>
</body>
</html>
